<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentence Illustrator - AI Powered Visuals</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-[#F8F9FA] text-[#202124]">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { GoogleGenAI } from 'https://esm.sh/@google/genai';

        const { useState, useEffect } = React;

        function App() {
            const [apiKey, setApiKey] = useState('');
            const [inputText, setInputText] = useState('');
            const [items, setItems] = useState([]);
            const [showSentences, setShowSentences] = useState(true);
            const [isGenerating, setIsGenerating] = useState(false);
            const [style, setStyle] = useState('irasutoya');
            const [showKeyInput, setShowKeyInput] = useState(true);

            const generateImages = async () => {
                if (!apiKey) {
                    alert('请先设置您的 Gemini API Key');
                    return;
                }
                if (!inputText.trim()) return;

                const sentences = inputText
                    .split('\n')
                    .map(s => s.trim())
                    .filter(s => s.length > 0);

                if (sentences.length === 0) return;

                setIsGenerating(true);
                const ai = new GoogleGenAI({ apiKey });
                
                const newItems = sentences.map((sentence, index) => ({
                    id: Date.now() + '-' + index,
                    sentence,
                    imageUrl: '',
                    loading: true
                }));

                setItems(prev => [...newItems, ...prev]);
                setInputText('');

                for (const item of newItems) {
                    try {
                        const prompt = style === 'irasutoya' 
                            ? `A cute Japanese illustration in the style of Irasutoya (flat design, simple colors, rounded characters) depicting: ${item.sentence}. The image must NOT contain any text, letters, or words.`
                            : `A high-quality modern digital illustration depicting: ${item.sentence}. The image must NOT contain any text, letters, or words.`;

                        const response = await ai.models.generateContent({
                            model: 'gemini-2.5-flash-image',
                            contents: { parts: [{ text: prompt }] },
                            config: { imageConfig: { aspectRatio: "1:1" } }
                        });

                        let imageUrl = '';
                        for (const part of response.candidates?.[0]?.content?.parts || []) {
                            if (part.inlineData) {
                                imageUrl = `data:image/png;base64,${part.inlineData.data}`;
                                break;
                            }
                        }

                        if (imageUrl) {
                            setItems(prev => prev.map(i => i.id === item.id ? { ...i, imageUrl, loading: false } : i));
                        } else {
                            throw new Error('No image generated');
                        }
                    } catch (error) {
                        console.error(error);
                        setItems(prev => prev.map(i => i.id === item.id ? { ...i, loading: false, error: '生成失败' } : i));
                    }
                }
                setIsGenerating(false);
            };

            return (
                <div className="min-h-screen pb-20">
                    {/* API Key Banner */}
                    {showKeyInput && (
                        <div className="bg-blue-600 text-white px-6 py-3 flex flex-wrap items-center justify-between gap-4">
                            <div className="flex items-center gap-2">
                                <i data-lucide="key" class="w-4 h-4"></i>
                                <span className="text-sm font-medium">请设置您的 Gemini API Key 以便在本地运行：</span>
                            </div>
                            <div className="flex items-center gap-2 flex-1 max-w-md">
                                <input 
                                    type="password" 
                                    value={apiKey}
                                    onChange={(e) => setApiKey(e.target.value)}
                                    placeholder="在此粘贴 API Key..."
                                    className="flex-1 bg-white/20 border border-white/30 rounded px-3 py-1 text-sm outline-none placeholder:text-white/50"
                                />
                                <button 
                                    onClick={() => setShowKeyInput(false)}
                                    className="text-xs font-bold hover:underline"
                                >
                                    隐藏
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Header */}
                    <header className="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-200 px-6 py-4">
                        <div className="max-w-7xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                                    <i data-lucide="sparkles"></i>
                                </div>
                                <div>
                                    <h1 className="text-xl font-bold tracking-tight">Sentence Illustrator</h1>
                                    <p className="text-xs text-gray-500 font-medium uppercase tracking-wider">AI Powered Visuals</p>
                                </div>
                            </div>

                            <div className="flex items-center gap-4">
                                <div className="flex items-center bg-gray-100 rounded-full p-1">
                                    <button 
                                        onClick={() => setShowSentences(false)}
                                        className={`px-4 py-1.5 rounded-full text-sm font-medium transition-all ${!showSentences ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'}`}
                                    >
                                        纯图模式
                                    </button>
                                    <button 
                                        onClick={() => setShowSentences(true)}
                                        className={`px-4 py-1.5 rounded-full text-sm font-medium transition-all ${showSentences ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'}`}
                                    >
                                        带文字模式
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-6 py-8">
                        <section className="mb-12">
                            <div className="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
                                <div className="p-6">
                                    <div className="flex items-center justify-between mb-4">
                                        <label className="text-sm font-bold text-gray-700 uppercase tracking-widest">输入句子 (每行一个)</label>
                                        <select 
                                            value={style}
                                            onChange={(e) => setStyle(e.target.value)}
                                            className="text-xs font-bold bg-gray-50 rounded-lg px-2 py-1 outline-none"
                                        >
                                            <option value="irasutoya">Irasutoya 风格</option>
                                            <option value="modern">现代风格</option>
                                        </select>
                                    </div>
                                    <textarea
                                        value={inputText}
                                        onChange={(e) => setInputText(e.target.value)}
                                        placeholder="例如：&#10;一只在喝咖啡的猫&#10;在雨中跳舞的机器人"
                                        className="w-full h-40 p-4 bg-gray-50 rounded-2xl border-2 border-transparent focus:border-blue-500 focus:bg-white transition-all resize-none text-lg outline-none"
                                    />
                                </div>
                                <div className="bg-gray-50 px-6 py-4 flex justify-end">
                                    <button
                                        onClick={generateImages}
                                        disabled={isGenerating || !inputText.trim()}
                                        className="bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 text-white px-8 py-3 rounded-xl font-bold flex items-center gap-2 transition-all shadow-lg"
                                    >
                                        {isGenerating ? <div className="loader"></div> : <i data-lucide="sparkles" class="w-5 h-5"></i>}
                                        开始生成
                                    </button>
                                </div>
                            </div>
                        </section>

                        <section>
                            <div className={`grid gap-8 ${showSentences ? 'grid-cols-1 md:grid-cols-2 lg:grid-cols-3' : 'grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5'}`}>
                                {items.map((item) => (
                                    <div key={item.id} className="bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100">
                                        <div className={`relative bg-gray-50 overflow-hidden ${showSentences ? 'aspect-square' : 'h-full'}`}>
                                            {item.loading ? (
                                                <div className="absolute inset-0 flex flex-col items-center justify-center gap-3">
                                                    <div className="loader !w-8 !h-8"></div>
                                                    <span className="text-xs font-bold text-gray-400">生成中...</span>
                                                </div>
                                            ) : item.error ? (
                                                <div className="absolute inset-0 flex items-center justify-center p-6 text-center text-red-500 text-sm font-bold">
                                                    {item.error}
                                                </div>
                                            ) : (
                                                <img src={item.imageUrl} className="w-full h-full object-cover" />
                                            )}
                                        </div>
                                        {showSentences && (
                                            <div className="p-5">
                                                <p className="text-sm font-medium text-gray-800">{item.sentence}</p>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </section>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Initialize Lucide icons after render
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
